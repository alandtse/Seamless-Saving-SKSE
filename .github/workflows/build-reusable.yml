# Reusable workflow for building Seamless Saving with xmake
name: Build

on:
  workflow_call:
    inputs:
      version:
        description: "Version string for the build"
        type: string
        required: false
        default: ""
      upload-artifact:
        description: "Whether to upload build artifact"
        type: boolean
        required: false
        default: false
      ref:
        description: "Git ref to checkout"
        type: string
        required: false
        default: ""
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact"
        value: ${{ jobs.build.outputs.artifact-name }}
      artifact-path:
        description: "Path to the built artifact"
        value: ${{ jobs.build.outputs.artifact-path }}
      normalized_version:
        description: "Normalized version number"
        value: ${{ jobs.build.outputs.normalized_version }}

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest
    if: github.repository_owner == 'alandtse'

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Extract project version from xmake.lua
        id: project_version
        shell: pwsh
        run: |
          $xmakeLua = Get-Content xmake.lua
          $versionLine = $xmakeLua | Where-Object { $_ -match 'local version = "(.+)"' }
          if ($versionLine) {
            $version = $matches[1]
            echo "version=$version" >> $env:GITHUB_OUTPUT
            echo "Extracted version: $version"
          } else {
            echo "Version not found in xmake.lua"
            exit 1
          }

      - name: Validate and normalize version
        id: normalize
        shell: pwsh
        run: |
          $extracted = "${{ steps.project_version.outputs.version }}"

          if ("${{ inputs.version }}" -ne "") {
            $version = "${{ inputs.version }}"
            $version = $version.Trim()
            # strip leading 'v' if present
            if ($version -match '^v(.+)$') {
              $version = $matches[1]
            }
            if ($version -notmatch '^\d+\.\d+\.\d+$') {
              echo "Invalid version format: $version. Expected format: x.y.z"
              exit 1
            }
            if ($version -ne $extracted) {
              echo "Input version $version does not match built version $extracted"
              exit 1
            }
            echo "normalized_version=$version" >> $env:GITHUB_OUTPUT
          } else {
            echo "normalized_version=$extracted" >> $env:GITHUB_OUTPUT
          }

          echo "Using version: $($extracted)"

      - name: Configure xmake
        run: xmake config -m releasedbg -y

      - name: Build with xmake
        run: xmake build -y

      - name: Package distribution
        shell: pwsh
        run: |
          $version = "${{ steps.project_version.outputs.version }}"
          $outputDir = "dist"
          $packageName = "SeamlessSaving_$version"

          # Create distribution directory structure
          New-Item -ItemType Directory -Path "$outputDir/SKSE/Plugins" -Force

          # Copy built files
          $dllPath = (Get-ChildItem -Path "build" -Recurse -Filter "seamless-saving.dll" | Select-Object -First 1).FullName
          $pdbPath = (Get-ChildItem -Path "build" -Recurse -Filter "seamless-saving.pdb" | Select-Object -First 1).FullName

          if (-not $dllPath) {
            echo "Error: seamless-saving.dll not found"
            exit 1
          }

          Copy-Item $dllPath "$outputDir/SKSE/Plugins/"
          if ($pdbPath) {
            Copy-Item $pdbPath "$outputDir/SKSE/Plugins/"
          }

          # Create 7z archive
          $archiveName = "$packageName.7z"
          7z a -t7z "$archiveName" "./$outputDir/*"

          echo "Created package: $archiveName"
          echo "artifact-path=$archiveName" >> $env:GITHUB_ENV

      - name: Set artifact info
        id: artifact_info
        shell: pwsh
        run: |
          $version = "${{ steps.project_version.outputs.version }}"
          $artifactName = "SeamlessSaving_$version"
          $artifactPath = "SeamlessSaving_$version.7z"
          echo "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT
          echo "artifact-path=$artifactPath" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact_info.outputs.artifact-name }}
          path: ${{ steps.artifact_info.outputs.artifact-path }}
          if-no-files-found: error

    outputs:
      artifact-name: ${{ steps.artifact_info.outputs.artifact-name }}
      artifact-path: ${{ steps.artifact_info.outputs.artifact-path }}
      normalized_version: ${{ steps.normalize.outputs.normalized_version }}
